<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APK·Omen_2 // Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            void:    '#050508',
            surface: '#0a0a0f',
            border:  '#1a1b26',
            dim:     '#4a4f6e',
            soft:    '#9ba3bf',
            bright:  '#c9d1f0',
            admin:   '#ff3b5c', // Red accent for Admin
          },
        }
      }
    }
  </script>

  <style>
    body { background-color: #050508; font-family: 'JetBrains Mono', monospace; color: #c9d1f0; }
    .dot-grid { background-image: radial-gradient(circle, #1a1b26 1px, transparent 1px); background-size: 28px 28px; }
    
    /* Login Wall */
    #login-wall { position: fixed; inset: 0; z-index: 100; background: #050508; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .auth-input { background: #0a0a0f; border: 1px solid #1a1b26; color: #c9d1f0; outline: none; transition: border-color 0.2s; }
    .auth-input:focus { border-color: #ff3b5c; box-shadow: 0 0 15px rgba(255,59,92,0.15); }
    
    /* Dashboard */
    #dashboard { display: none; }
    .stat-card { background: #0a0a0f; border: 1px solid #1a1b26; border-top: 2px solid #ff3b5c; }
    
    /* Tabs */
    .tab-btn { color: #4a4f6e; transition: all 0.2s; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #ff3b5c; border-bottom: 2px solid #ff3b5c; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    /* User Accordions */
    .user-row { background: #0a0a0f; border: 1px solid #1a1b26; border-left: 3px solid #4a4f6e; transition: all 0.2s; }
    .user-row:hover { border-left-color: #ff3b5c; background: #0d0d14; }
    .user-scans { display: none; border-top: 1px solid #1a1b26; background: #050508; }
    .user-scans.open { display: block; }
    
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a1b26; border-radius: 3px; }
  </style>
</head>

<body class="min-h-screen dot-grid">

  <div id="login-wall">
    <div class="w-full max-w-sm p-8 bg-[#0a0a0f] border border-[#1a1b26] rounded-xl shadow-2xl text-center">
      <div class="w-12 h-12 mx-auto mb-4 bg-[#1a0810] border border-[#5c0e20] rounded-lg flex items-center justify-center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff3b5c" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="font-display font-700 text-xl text-bright mb-1">Command Center</h1>
      <p class="text-[11px] text-dim mb-6">Restricted Access</p>
      
      <input type="password" id="admin-pass" placeholder="Enter Admin Password" class="auth-input w-full px-4 py-3 rounded-lg text-sm font-mono mb-4 text-center tracking-widest" />
      <button id="login-btn" class="w-full py-3 rounded-lg font-display font-600 text-sm bg-[#ff3b5c] text-white hover:bg-[#e02b4a] transition-colors">Access Uplink</button>
      <p id="login-err" class="text-[#ff3b5c] text-[10px] mt-3 hidden">Invalid credentials.</p>
    </div>
  </div>

  <div id="dashboard" class="max-w-7xl mx-auto px-6 py-8">
    
    <header class="flex items-center justify-between mb-8 pb-6 border-b border-[#1a1b26]">
      <div>
        <h1 class="font-display font-800 text-2xl tracking-tight text-bright">APK<span class="text-admin">·</span>Omen_2 <span class="text-dim font-400">// Admin</span></h1>
        <p class="text-xs text-dim font-mono mt-1" id="last-sync">Syncing telemetry...</p>
      </div>
      <button onclick="location.reload()" class="text-xs font-display px-4 py-2 bg-[#0a0a0f] border border-[#1a1b26] rounded text-soft hover:text-bright transition-colors">Refresh Data</button>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="stat-card rounded-lg p-5">
        <p class="text-[10px] uppercase tracking-widest text-dim font-display mb-1">Total Scans</p>
        <p class="text-3xl font-mono text-bright" id="stat-scans">-</p>
      </div>
      <div class="stat-card rounded-lg p-5">
        <p class="text-[10px] uppercase tracking-widest text-dim font-display mb-1">Unique Users</p>
        <p class="text-3xl font-mono text-bright" id="stat-users">-</p>
      </div>
      <div class="stat-card rounded-lg p-5">
        <p class="text-[10px] uppercase tracking-widest text-dim font-display mb-1">Unique APKs</p>
        <p class="text-3xl font-mono text-bright" id="stat-apks">-</p>
      </div>
      <div class="stat-card rounded-lg p-5 border-t-[#ff7b2c]">
        <p class="text-[10px] uppercase tracking-widest text-dim font-display mb-1">Total Criticals Found</p>
        <p class="text-3xl font-mono text-[#ff7b2c]" id="stat-crits">-</p>
      </div>
    </div>

    <div class="flex gap-6 mb-6 border-b border-[#1a1b26]">
      <button class="tab-btn active pb-3 font-display text-sm font-600" onclick="switchTab('tab-users')">User Intelligence</button>
      <button class="tab-btn pb-3 font-display text-sm font-600" onclick="switchTab('tab-global')">Global APK Log</button>
    </div>

    <div id="tab-users" class="tab-content active space-y-3">
      <div class="text-center py-10 text-dim text-sm"><div class="animate-spin w-5 h-5 border-2 border-dim border-t-admin rounded-full mx-auto mb-3"></div>Loading users...</div>
    </div>

    <div id="tab-global" class="tab-content bg-[#0a0a0f] border border-[#1a1b26] rounded-xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left text-[11px] font-mono whitespace-nowrap">
          <thead class="bg-[#050508] border-b border-[#1a1b26] text-dim">
            <tr>
              <th class="px-5 py-4 font-500">Date</th>
              <th class="px-5 py-4 font-500">Package Name</th>
              <th class="px-5 py-4 font-500">Target SDK</th>
              <th class="px-5 py-4 font-500 text-right">Crit / High</th>
            </tr>
          </thead>
          <tbody id="global-table" class="divide-y divide-[#1a1b26]">
            </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // ── CONFIGURATION ──────────────────────────────────────────
    const ADMIN_PASSWORD = "omen2026"; 
    
    const firebaseConfig = {
      apiKey:            "AIzaSyClzccQBizc0eKBq-UgRYA2u5LlbxGyOTA",
      authDomain:        "apk-omen-2.firebaseapp.com",
      projectId:         "apk-omen-2",
      storageBucket:     "apk-omen-2.firebasestorage.app",
      messagingSenderId: "978235525217",
      appId:             "1:978235525217:web:47725e4541a587a8c00220",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── LOGIN LOGIC ─────────────────────────────────────────────
    const passInput = document.getElementById('admin-pass');
    const loginBtn = document.getElementById('login-btn');
    const loginErr = document.getElementById('login-err');

    function attemptLogin() {
      if (passInput.value === ADMIN_PASSWORD) {
        document.getElementById('login-wall').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        fetchTelemetry();
      } else {
        loginErr.classList.remove('hidden');
        passInput.value = '';
      }
    }

    loginBtn.onclick = attemptLogin;
    passInput.onkeypress = (e) => { if (e.key === 'Enter') attemptLogin(); }

    // ── TAB LOGIC ───────────────────────────────────────────────
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    function toggleUser(uid) {
      const scansDiv = document.getElementById(`scans-${uid}`);
      scansDiv.classList.toggle('open');
    }

    // ── DATA FETCHING & RENDERING ───────────────────────────────
    async function fetchTelemetry() {
      try {
        const snapshot = await db.collection('scans').orderBy('scan_timestamp', 'desc').get();
        
        let totalScans = 0;
        let totalCrits = 0;
        const uniqueUsers = new Set();
        const uniqueApks = new Set();
        
        // Group data by user
        const usersData = {};
        const allScansList = [];

        snapshot.forEach(doc => {
          const data = doc.data();
          totalScans++;
          
          const uid = data.uid || 'Anonymous';
          const email = data.email || 'Unknown Email (Legacy Scan)';
          uniqueUsers.add(uid);
          
          const pkg = data.app_profile?.package_name || 'Unknown APK';
          uniqueApks.add(pkg);
          
          const crits = data.summary?.by_severity?.CRITICAL || 0;
          const highs = data.summary?.by_severity?.HIGH || 0;
          totalCrits += crits;

          const dateStr = new Date(data.scan_timestamp).toLocaleString();

          // Prepare flat list for Global table
          allScansList.push(`
            <tr class="hover:bg-[#0d0d14] transition-colors">
              <td class="px-5 py-3 text-dim">${dateStr}</td>
              <td class="px-5 py-3 text-bright">${pkg}</td>
              <td class="px-5 py-3 text-soft">${data.app_profile?.target_sdk || 'N/A'}</td>
              <td class="px-5 py-3 text-right"><span class="text-[#ff3b5c]">${crits}</span> / <span class="text-[#ff7b2c]">${highs}</span></td>
            </tr>
          `);

          // Prepare grouped data for Users tab, saving the email inside the object
          if (!usersData[uid]) usersData[uid] = { email: email, scans: [] };
          usersData[uid].scans.push({ pkg, dateStr, crits, highs });
        });

        // 1. Update Top Stats
        document.getElementById('stat-scans').innerText = totalScans;
        document.getElementById('stat-users').innerText = uniqueUsers.size;
        document.getElementById('stat-apks').innerText = uniqueApks.size;
        document.getElementById('stat-crits').innerText = totalCrits;
        document.getElementById('last-sync').innerText = "Last sync: " + new Date().toLocaleTimeString();

        // 2. Render Global Table
        document.getElementById('global-table').innerHTML = allScansList.join('');

        // 3. Render Users Tab
        const usersContainer = document.getElementById('tab-users');
        usersContainer.innerHTML = ''; // clear loading text

        Object.keys(usersData).forEach(uid => {
          const userObj = usersData[uid];
          const scans = userObj.scans;
          const userEmail = userObj.email;
          const uidShort = uid.length > 15 ? uid.substring(0, 15) + '...' : uid;
          
          const userBlock = document.createElement('div');
          userBlock.className = 'user-row rounded-lg overflow-hidden';
          
          let scanRows = scans.map(s => `
            <div class="flex justify-between items-center px-6 py-3 border-b border-[#1a1b26] last:border-0 hover:bg-[#0a0a0f]">
              <div>
                <p class="text-bright text-[11px]">${s.pkg}</p>
                <p class="text-dim text-[10px] mt-1">${s.dateStr}</p>
              </div>
              <div class="text-[10px] bg-[#1a0810] text-[#ff3b5c] border border-[#5c0e20] px-2 py-1 rounded">
                ${s.crits} Critical, ${s.highs} High
              </div>
            </div>
          `).join('');

          userBlock.innerHTML = `
            <button onclick="toggleUser('${uid}')" class="w-full flex justify-between items-center px-6 py-4 focus:outline-none">
              <div class="text-left">
                <p class="font-display font-600 text-sm text-bright">${userEmail}</p>
                <p class="text-[10px] text-dim font-mono mt-1">UID: ${uidShort} • ${scans.length} Total Scans</p>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4a4f6e" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div id="scans-${uid}" class="user-scans">
              ${scanRows}
            </div>
          `;
          usersContainer.appendChild(userBlock);
        });

      } catch (err) {
        console.error("Failed to fetch telemetry:", err);
        document.getElementById('last-sync').innerText = "Sync failed. Check console.";
      }
    }
  </script>
</body>
</html>
